const { useState, useEffect, useCallback } = React;

function saveState(s) {

const BABY_COLORS = [
  { id:"peach",  bg:DB.bg, accent:"#E1A089", deep:"#BF7958", soft:"#F5E6DE", sleepBg:"#F5EDE8", sleepBorder:"#C4845E", sleepInputBg:"#F0DDD4", label:"Peach"  },
  { id:"rose",   bg:DB.bg, accent:"#E5A0B0", deep:"#B4607A", soft:"#F5E0E6", sleepBg:"#F5E8ED", sleepBorder:"#B4607A", sleepInputBg:"#EDD8DF", label:"Rose"   },
  { id:"butter", bg:DB.bg, accent:"#D4A84B", deep:"#9F7A1E", soft:"#F5EBCC", sleepBg:"#F5EDD8", sleepBorder:"#9F7A1E", sleepInputBg:"#EDE3C4", label:"Butter" },
  { id:"mint",   bg:DB.bg, accent:"#7EB89A", deep:"#4A8A6A", soft:"#DFF0E8", sleepBg:"#E8F4EE", sleepBorder:"#4A8A6A", sleepInputBg:"#D4EBDF", label:"Mint"   },
  { id:"sky",    bg:DB.bg, accent:"#7EB8D4", deep:"#3A88AA", soft:"#DDF0F8", sleepBg:"#E4F1F8", sleepBorder:"#3A88AA", sleepInputBg:"#CEE8F4", label:"Sky"    },
  { id:"lilac",  bg:DB.bg, accent:"#A99AE0", deep:"#6A5AB0", soft:"#EAE6F8", sleepBg:"#EEEAF8", sleepBorder:"#6A5AB0", sleepInputBg:"#E0DAF4", label:"Lilac"  },
];

const FIELD_KEYS = [
  "wakeNight","sleep1","awake2","sleep2","awake3","sleep3",
  "awake4","sleep4","awake5","sleep5","awake6","nightSleep"
];
const FIELD_LABELS = {
  wakeNight:  "Woke from night sleep",
  sleep1:     "Nap 1 — start",
  awake2:     "Awake after nap 1",
  sleep2:     "Nap 2 — start",
  awake3:     "Awake after nap 2",
  sleep3:     "Nap 3 — start",
  awake4:     "Awake after nap 3",
  sleep4:     "Nap 4 — start",
  awake5:     "Awake after nap 4",
  sleep5:     "Nap 5 — start",
  awake6:     "Awake after nap 5",
  nightSleep: "Night sleep — start",
};
const FIELD_ICONS = {
  wakeNight:"sun", sleep1:"moon", awake2:"sun", sleep2:"moon", awake3:"sun",
  sleep3:"moon", awake4:"sun", sleep4:"moon", awake5:"sun", sleep5:"moon",
  awake6:"sun", nightSleep:"moon",
};
const SLEEP_KEYS = new Set(["sleep1","sleep2","sleep3","sleep4","sleep5","nightSleep","wakeNight"]);

// ─── Helpers (UNCHANGED logic) ─────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function timeToMin(t) {
  if (!t || t === "") return null;
  const p = t.split(":");
  const h = Number(p[0]), m = Number(p[1]);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}
function diffMin(a, b) {
  if (a === null || b === null) return null;
  let d = b - a; if (d < 0) d += 1440; return d;
}
function fmtDur(min) {
  if (min === null || min === undefined || min < 0) return "—";
  const h = Math.floor(min/60), m = min%60;
  if (h===0) return m+"m"; if (m===0) return h+"h"; return h+"h "+m+"m";
}
function fmtDurLong(min) {
  if (min === null || min === undefined || min < 0) return "—";
  const h = Math.floor(min/60), m = min%60;
  if (h===0) return m+" min"; if (m===0) return h+"h"; return h+"h "+m+" min";
}
function nowHHMM() {
  const d = new Date();
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function calcDay(day) {
  const g = k => timeToMin(day[k] || "");
  const wn=g("wakeNight"),s1=g("sleep1"),a2=g("awake2"),s2=g("sleep2"),a3=g("awake3"),
        s3=g("sleep3"),a4=g("awake4"),s4=g("sleep4"),a5=g("awake5"),s5=g("sleep5"),a6=g("awake6"),ns=g("nightSleep");
  const aw1 = s1!==null&&wn!==null?diffMin(wn,s1):null;
  const aw2 = s2!==null&&a2!==null?diffMin(a2,s2):null;
  const aw3 = s3!==null&&a3!==null?diffMin(a3,s3):null;
  const aw4 = s4!==null&&a4!==null?diffMin(a4,s4):null;
  const aw5 = s5!==null&&a5!==null?diffMin(a5,s5):null;
  const candidates = [a6,a5,a4,a3,a2,wn];
  var lastAwakeStart = null;
  if (ns !== null) { for (var ci=0;ci<candidates.length;ci++){if(candidates[ci]!==null){lastAwakeStart=candidates[ci];break;}} }
  const awLast = ns!==null&&lastAwakeStart!==null?diffMin(lastAwakeStart,ns):null;
  const numbered = [aw1,aw2,aw3,aw4,aw5].filter(v=>v!==null);
  const awakeWindows = awLast!==null ? numbered.concat([awLast]) : numbered;
  const awakeTotal = awakeWindows.length?awakeWindows.reduce(function(a,b){return a+b;},0):null;
  const n1r=s1!==null&&a2!==null?diffMin(s1,a2):null;
  const n2r=s2!==null&&a3!==null?diffMin(s2,a3):null;
  const n3r=s3!==null&&a4!==null?diffMin(s3,a4):null;
  const n4r=s4!==null&&a5!==null?diffMin(s4,a5):null;
  const n5r=s5!==null&&a6!==null?diffMin(s5,a6):null;
  const sleepNaps=[n1r,n2r,n3r,n4r,n5r].filter(v=>v!==null);
  const sleepDay=sleepNaps.length?sleepNaps.reduce(function(a,b){return a+b;},0):null;
  const sleepNight=ns!==null&&wn!==null?(1440-ns)+wn:null;
  const sleepTotal=sleepDay!==null||sleepNight!==null?(sleepDay||0)+(sleepNight||0):null;
  return {aw1,aw2,aw3,aw4,aw5,awLast,awakeTotal,n1:n1r,n2:n2r,n3:n3r,n4:n4r,n5:n5r,sleepDay,sleepNight,sleepTotal,napCount:sleepNaps.length};
}
function getLiveStatus(dayData, isToday) {
  const filled = FIELD_KEYS.filter(k=>dayData[k]);
  if (!filled.length) return {status:"unknown",duration:null};
  if (!isToday) {
    const last = filled[filled.length-1];
    return {status:SLEEP_KEYS.has(last)&&last!=="wakeNight"?"night":"complete",duration:null};
  }
  const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
  const last=filled[filled.length-1],lastMin=timeToMin(dayData[last]);
  if (lastMin===null) return {status:"unknown",duration:null};
  if (last==="nightSleep") {
    const dur=nowMin<lastMin?(1440-lastMin+nowMin):(nowMin-lastMin);
    return dur>840?{status:"unknown",duration:null}:{status:"sleeping",duration:dur};
  }
  if (last==="wakeNight") {
    const dur=diffMin(lastMin,nowMin);
    return dur>720?{status:"unknown",duration:null}:{status:"awake",duration:dur};
  }
  const isSleeping=SLEEP_KEYS.has(last),dur=diffMin(lastMin,nowMin),cap=isSleeping?240:720;
  if (dur===null||dur>cap) return {status:"unknown",duration:null};
  return {status:isSleeping?"sleeping":"awake",duration:dur};
}
function getNextField(dayData) {
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const isNightTime=nowMin>=1140||nowMin<420;
  for (var i=0;i<FIELD_KEYS.length;i++) {
    const key=FIELD_KEYS[i];
    if (!dayData[key]) {
      if (isNightTime&&key!=="nightSleep"&&key!=="wakeNight") {
        const prevKey=i>0?FIELD_KEYS[i-1]:null;
        const prevIsSleep=prevKey&&SLEEP_KEYS.has(prevKey)&&prevKey!=="wakeNight";
        if (!prevIsSleep) return "nightSleep";
      }
      return key;
    }
  }
  return null;
}
function getVisibleFields(dayData) {
  const result=[];
  for (var i=0;i<FIELD_KEYS.length;i++){const key=FIELD_KEYS[i];result.push(key);if(!dayData[key])break;}
  if (!result.includes("nightSleep")&&FIELD_KEYS.slice(0,-1).some(function(k){return dayData[k];})) result.push("nightSleep");
  return result;
}
function shiftDate(date,delta,setDate){
  const d=new Date(date+"T12:00:00");d.setDate(d.getDate()+delta);
  const str=d.toISOString().slice(0,10);if(str<=todayStr())setDate(str);
}
function fmtDate(str){
  const d=new Date(str+"T12:00:00");
  return d.toLocaleDateString("en-GB",{month:"short",day:"numeric",weekday:"short"});
}
function fmtDateLong(str){
  const d=new Date(str+"T12:00:00");
  return d.toLocaleDateString("en-GB",{weekday:"long",month:"short",day:"numeric"});
}
function getAge(dob){
  if(!dob)return"";
  const days=Math.floor((new Date()-new Date(dob))/86400000);
  if(days<30)return days+" days old";
  const mo=Math.floor(days/30.44);
  if(mo<24)return mo+" months old";
  return Math.floor(mo/12)+" years old";
}
function getDatesBack(n){
  const r=[];for(var i=0;i<n;i++){const d=new Date();d.setDate(d.getDate()-i);r.push(d.toISOString().slice(0,10));}return r;
}

// ─── SVG Icons ─────────────────────────────────────────────────────
function Ic(props) {
  var name=props.name, size=props.size||16, color=props.color||"currentColor", sw=props.sw||1.6;
  var s={width:size,height:size,display:"block",flexShrink:0};
  var p={stroke:color,strokeWidth:sw,strokeLinecap:"round",strokeLinejoin:"round",fill:"none"};
  if (name==="moon")   return <svg viewBox="0 0 24 24" style={s}><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" {...p}/></svg>;
  if (name==="sun")    return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="5" {...p}/><line x1="12" y1="2" x2="12" y2="3" {...p}/><line x1="12" y1="21" x2="12" y2="22" {...p}/><line x1="4.22" y1="4.22" x2="4.93" y2="4.93" {...p}/><line x1="19.07" y1="19.07" x2="19.78" y2="19.78" {...p}/><line x1="2" y1="12" x2="3" y2="12" {...p}/><line x1="21" y1="12" x2="22" y2="12" {...p}/><line x1="4.22" y1="19.78" x2="4.93" y2="19.07" {...p}/><line x1="19.07" y1="4.93" x2="19.78" y2="4.22" {...p}/></svg>;
  if (name==="chevL")  return <svg viewBox="0 0 24 24" style={s}><polyline points="15 18 9 12 15 6" {...p}/></svg>;
  if (name==="chevR")  return <svg viewBox="0 0 24 24" style={s}><polyline points="9 18 15 12 9 6" {...p}/></svg>;
  if (name==="gear")   return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="3" {...p}/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" {...p}/></svg>;
  if (name==="plus")   return <svg viewBox="0 0 24 24" style={s}><line x1="12" y1="5" x2="12" y2="19" {...p}/><line x1="5" y1="12" x2="19" y2="12" {...p}/></svg>;
  if (name==="arrow")  return <svg viewBox="0 0 24 24" style={s}><line x1="5" y1="12" x2="19" y2="12" {...p}/><polyline points="12 5 19 12 12 19" {...p}/></svg>;
  if (name==="bar")    return <svg viewBox="0 0 24 24" style={s}><line x1="18" y1="20" x2="18" y2="10" {...p}/><line x1="12" y1="20" x2="12" y2="4" {...p}/><line x1="6" y1="20" x2="6" y2="14" {...p}/></svg>;
  if (name==="clock")  return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="10" {...p}/><polyline points="12 6 12 12 16 14" {...p}/></svg>;
  if (name==="baby")   return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="10" {...p}/><path d="M8 14s1.5 2 4 2 4-2 4-2" {...p}/><line x1="9" y1="9" x2="9.01" y2="9" {...p}/><line x1="15" y1="9" x2="15.01" y2="9" {...p}/></svg>;
  return <svg viewBox="0 0 24 24" style={s}><circle cx="12" cy="12" r="3" fill={color}/></svg>;
}

// ─── Root App ──────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("intro");
  const [babies, setBabies] = useState([]);
  const [activeBabyId, setActiveBabyId] = useState(null);
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [editBabyId, setEditBabyId] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [tick, setTick] = useState(0);

  useEffect(function(){
    const s=loadState();
    if(s){setBabies(s.babies||[]);setActiveBabyId(s.activeBabyId||null);if(s.babies&&s.babies.length>0)setScreen("main");}
  },[]);
  useEffect(function(){saveState({babies,activeBabyId});},[babies,activeBabyId]);
  useEffect(function(){const t=setInterval(function(){setTick(function(x){return x+1;});},30000);return function(){clearInterval(t);};},[]);

  const activeBaby = babies.find(function(b){return b.id===activeBabyId;})||babies[0];

  function getDayData(babyId,date){
    const b=babies.find(function(x){return x.id===babyId;});
    return (b&&b.days&&b.days[date])||{};
  }
  function setDayData(babyId,date,data){
    setBabies(function(prev){return prev.map(function(b){
      if(b.id!==babyId)return b;
      const days=b.days||{};
      const existing=days[date]||{};
      const merged=Object.assign({},existing,data);
      return Object.assign({},b,{days:Object.assign({},days,{[date]:merged})});
    });});
  }

  if(screen==="intro") return <IntroScreen onStart={function(){setScreen("addBaby");}}/>;
  if(screen==="addBaby") return (
    <AddBabyScreen
      onSave={function(baby){const nb=Object.assign({},baby,{id:Date.now().toString(),days:{}});setBabies(function(p){return p.concat([nb]);});setActiveBabyId(nb.id);setScreen("main");}}
      onBack={babies.length>0?function(){setScreen("main");}:null}
    />
  );
  if(screen==="editBaby"&&editBabyId){
    const baby=babies.find(function(b){return b.id===editBabyId;});
    return (
      <AddBabyScreen initial={baby}
        onSave={function(u){setBabies(function(p){return p.map(function(b){return b.id===editBabyId?Object.assign({},b,u):b;});});setScreen("main");setMenuOpen(false);}}
        onBack={function(){setScreen("main");setMenuOpen(false);}}
        onDelete={function(){
          const rem=babies.filter(function(b){return b.id!==editBabyId;});
          setBabies(rem);
          setActiveBabyId(rem[0]?rem[0].id:null);
          setScreen(rem.length>0?"main":"intro");
          setMenuOpen(false);
        }}
      />
    );
  }
  if(screen==="reports"&&activeBaby) return <ReportsScreen baby={activeBaby} onBack={function(){setScreen("main");}}/>;

  const color=BABY_COLORS.find(function(c){return c.id===(activeBaby&&activeBaby.color);})||BABY_COLORS[0];
  const dayData=activeBaby?getDayData(activeBaby.id,selectedDate):{};

  return (
    <div style={{minHeight:"100vh",minHeight:"100dvh",background:DB.bg,fontFamily:DB.sans,color:DB.ink,overflowX:"hidden",width:"100%",maxWidth:"100vw"}}>
      <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

      {/* ── Header ── */}
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"12px 20px",borderBottom:"1px solid "+DB.hairline,
        background:DB.bg+"f8",backdropFilter:"blur(10px)",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <AppIcon size={30} r={8}/>
          <span style={{fontFamily:DB.serif,fontWeight:400,fontSize:17,color:DB.ink,letterSpacing:-0.3}}>
            moms<span style={{color:color.deep,fontStyle:"italic"}}>'</span> math
          </span>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {/* Baby avatars */}
          {babies.map(function(b){
            const bc=BABY_COLORS.find(function(c){return c.id===b.color;})||BABY_COLORS[0];
            const isActive=b.id===activeBabyId;
            return (
              <button key={b.id} onClick={function(){setActiveBabyId(b.id);setSelectedDate(todayStr());}}
                style={{width:30,height:30,borderRadius:15,border:isActive?"2px solid "+DB.ink:"2px solid transparent",
                  background:bc.accent,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:DB.sans,fontWeight:700,fontSize:12,color:"#fff",flexShrink:0}}>
                {b.name[0].toUpperCase()}

// ─── Day Log Editor ────────────────────────────────────────────────
function DayLogEditor(props) {
  var dayData=props.dayData, setDayData=props.setDayData, color=props.color, calc=props.calc;
  var accent=color?color.accent:DB.peach;
  var accentDeep=color?color.deep:DB.peachDeep;
  var accentSoft=color?color.soft:DB.peachSoft;
  var sleepBg=color?color.sleepBg:"#F5EFF4";
  var sleepBorder=color?color.sleepBorder:DB.night;
  var sleepInputBg=color?color.sleepInputBg:"#EDE5EC";
  const visible=getVisibleFields(dayData);

  // Find the previous filled field's time, to validate ordering (UI-only check, no logic change)
  function getPrevFilledMin(idx){
    for(var j=idx-1;j>=0;j--){
      var pk=visible[j];
      var pv=dayData[pk];
      if(pv){
        var pm=timeToMin(pv);
        if(pm!==null)return {min:pm,key:pk};
      }
    }
    return null;
  }

  return(
    <div style={{padding:"6px 0 12px"}}>
      {visible.map(function(key,idx){
        const isSleep=SLEEP_KEYS.has(key)&&key!=="wakeNight";
        const val=dayData[key]||"";
        const hasVal=!!val;
        const icon=FIELD_ICONS[key]||"sun";
        // nap duration hint
        const napMap={sleep1:"n1",sleep2:"n2",sleep3:"n3",sleep4:"n4",sleep5:"n5"};
        const durKey=napMap[key];
        const napDur=durKey&&calc&&calc[durKey]?fmtDur(calc[durKey]):null;

        // Out-of-order check: current value must be after the previous filled field
        // (nightSleep is allowed to be "smaller" since it usually wraps past midnight conceptually,
        // but within the same day log entry sequence it should still come after the last evening field)
        var outOfOrder=false;
        if(hasVal){
          var curMin=timeToMin(val);
          var prevInfo=getPrevFilledMin(idx);
          if(prevInfo!==null&&curMin!==null){
            if(curMin<=prevInfo.min){
              outOfOrder=true;
            }
          }
        }

        return(
          <div key={key} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",
            background:isSleep&&hasVal&&!outOfOrder?sleepBg:outOfOrder?"#FBEAE8":"transparent",
            borderBottom:"1px solid "+DB.hairline}}>
            {/* icon */}
            <span style={{width:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <Ic name={outOfOrder?"sun":icon} size={14} color={outOfOrder?"#C0392B":(hasVal?accentDeep:DB.muted)}/>
            </span>
            {/* label */}
            <div style={{flex:1}}>
              <div style={{fontSize:16,color:hasVal?DB.ink:DB.muted,fontWeight:hasVal?500:400}}>
                {FIELD_LABELS[key]}
              </div>
              {napDur&&!outOfOrder&&<div style={{fontSize:13,color:DB.muted,marginTop:2}}>{napDur}</div>}
              {outOfOrder&&<div style={{fontSize:13,color:"#C0392B",marginTop:2,fontWeight:600}}>Earlier than previous time</div>}
            </div>
            {/* time input or Set time button */}
            {hasVal?(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input type="time" value={val} onChange={function(e){setDayData({[key]:e.target.value||null});}}
                  style={{padding:"8px 14px",borderRadius:100,
                    border:"1.5px solid "+(outOfOrder?"#C0392B":(isSleep?sleepBorder:DB.hairline)),
                    fontSize:16,fontWeight:700,color:DB.ink,background:outOfOrder?"#fff":(isSleep?sleepInputBg:"#fff"),
                    outline:"none",width:104,fontFamily:DB.sans}}/>
                <button onClick={function(){setDayData({[key]:null});}}
                  style={{width:30,height:30,borderRadius:15,border:"none",background:DB.hairline,
                    color:DB.muted,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>
            ):(
              <div style={{position:"relative",width:108,height:38}}>
                <input type="time" value="" onChange={function(e){if(e.target.value)setDayData({[key]:e.target.value});}}
                  style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:2}}/>
                <div style={{position:"absolute",inset:0,padding:"8px 16px",borderRadius:100,
                  border:"1.5px solid "+accentSoft,background:accentSoft,fontSize:14,fontWeight:600,
                  color:accentDeep,fontFamily:DB.sans,display:"flex",alignItems:"center",justifyContent:"center",
                  whiteSpace:"nowrap",pointerEvents:"none",zIndex:1}}>
                  Set time
                </div>
              </div>
            )}
          </div>
        );
      })}
      {/* Notes */}
      <div style={{padding:"10px 18px 4px"}}>
        <textarea value={dayData.comments||""} onChange={function(e){setDayData({comments:e.target.value});}}
          placeholder="Notes for the day…" rows={2}
          style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid "+DB.hairline,
            fontSize:15,fontFamily:DB.serif,fontStyle:"italic",background:DB.bg,resize:"none",
            outline:"none",boxSizing:"border-box",color:DB.ink2,lineHeight:1.5}}/>
      </div>
    </div>
  );
}

// ─── Summary ───────────────────────────────────────────────────────
function CalcSummary(props) {
  var calc=props.calc, color=props.color;
  var accentDeep=color?color.deep:DB.peachDeep;
  var accentSoft=color?color.soft:DB.peachSoft;
  var nightColor=color?color.deep:"#7B5E7A";
  var nightSoft=color?color.soft:"#EDE5EC";

  // type: "night" | "nap" | "awake" | "total"
  const rows=[
    {label:"Night sleep",       val:calc.sleepNight, type:"night"},
    {label:"Nap sleep",         val:calc.sleepDay,   type:"nap"},
    {label:"Last awake window", val:calc.awLast,     type:"awake"},
    {label:"Total awake time",  val:calc.awakeTotal, type:"awake"},
    {label:"Total sleep",       val:calc.sleepTotal, type:"total"},
  ].filter(function(r){return r.val!==null&&r.val!==undefined;});

  if(!rows.length)return null;

  function rowStyle(type){
    if(type==="night") return nightSoft;
    if(type==="nap")   return accentSoft;
    if(type==="total") return accentSoft;
    return "transparent";
  }
  function dotColor(type){
    if(type==="night") return nightColor;
    if(type==="nap")   return color?color.accent:DB.peach;
    if(type==="awake") return DB.hairline;
    return null;
  }
  function valColor(type){
    if(type==="total") return accentDeep;
    if(type==="night") return nightColor;
    if(type==="nap")   return accentDeep;
    return DB.ink;
  }

  return(
    <div style={{margin:"12px 20px 0",background:DB.paper,borderRadius:18,border:"1px solid "+DB.hairline,overflow:"hidden"}}>
      <div style={{padding:"14px 18px 10px",borderBottom:"1px solid "+DB.hairline}}>
        <span style={{fontFamily:DB.serif,fontWeight:400,fontSize:18,color:DB.ink,letterSpacing:-0.3}}>Today's summary</span>
      </div>
      {rows.map(function(r){
        var isTotal=r.type==="total";
        var dot=dotColor(r.type);
        return(
          <div key={r.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"14px 18px",borderBottom:"1px solid "+DB.hairline,
            background:rowStyle(r.type)}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {dot&&<div style={{width:8,height:8,borderRadius:2,background:dot,flexShrink:0}}/>}
              {!dot&&<div style={{width:8,flexShrink:0}}/>}
              <span style={{fontSize:16,color:DB.ink2,fontWeight:isTotal?600:400}}>{r.label}</span>
            </div>
            <span style={{fontSize:isTotal?20:16,fontWeight:700,color:valColor(r.type),
              fontFamily:isTotal?DB.serif:DB.sans,letterSpacing:isTotal?-0.3:0}}>
              {fmtDur(r.val)}
            </span>
          </div>
        );
      })}
    </div>
  );
}

// ─── Reports ───────────────────────────────────────────────────────
function ReportsScreen(props) {
  var baby=props.baby, onBack=props.onBack;
  const [period,setPeriod]=useState(7); // null = all available data
  const color=BABY_COLORS.find(function(c){return c.id===baby.color;})||BABY_COLORS[0];
  var accentDeep=color.deep;
  var accentSoft=color.soft;
  var nightColor=color.deep;
  var nightSoftColor=color.soft;
  const presets=[[7,"Week"],[14,"2 wks"],[30,"Month"],[90,"3 mo"]];

  // null period = show all days that have data (up to 180 days back)
  var effectivePeriod=period||180;
  const dates=getDatesBack(effectivePeriod);
  const rows=dates.map(function(d){
    const day=(baby.days&&baby.days[d])||{};
    const c=calcDay(day);
    const segs=buildTimelineSegs(day);
    const hasData=Object.values(day).some(function(v){return v&&typeof v==="string"&&v.match(/\d/);});
    return Object.assign({date:d,segs:segs,hasData:hasData,day:day},c);
  });

  const dataRows=rows.filter(function(r){return r.hasData;});
  function avg(key){
    const vals=dataRows.map(function(r){return r[key];}).filter(function(v){return v!==null&&v!==undefined;});
    if(!vals.length)return null;
    return Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
  }
  var avgNight=avg("sleepNight");
  var avgNaps=avg("sleepDay");
  var avgAwake=avg("awakeTotal");
  // Total = Night + Naps so it always matches what user sees in the breakdown
  var avgTotal=(avgNight||0)+(avgNaps||0);
  var avgH=Math.floor(avgTotal/60);
  var avgM=avgTotal%60;
  var nightSoftColor="#EDE5EC";

  return(
    <div style={{minHeight:"100vh",minHeight:"100dvh",background:DB.bg,fontFamily:DB.sans,color:DB.ink,overflowX:"hidden"}}>
      <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px 10px",
        borderBottom:"1px solid "+DB.hairline,position:"sticky",top:0,
        background:DB.bg+"f8",backdropFilter:"blur(10px)",zIndex:50}}>
        <button onClick={onBack} style={{width:34,height:34,borderRadius:17,border:"1px solid "+DB.hairline,
          background:DB.paper,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:DB.ink}}>
          <Ic name="chevL" size={16}/>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:DB.muted,fontWeight:600}}>{baby.name}{getAge(baby.dob)?" · "+getAge(baby.dob):""}</div>
          <div style={{fontFamily:DB.serif,fontWeight:400,fontSize:22,letterSpacing:-0.5,color:DB.ink,lineHeight:1.2}}>
            <span style={{fontStyle:"italic",color:accentDeep}}>Rhythm,</span> {period?"last "+period+" days":"all time"}
          </div>
        </div>
        <BabyAvatar name={baby.name} accent={color.accent} size={34}/>
      </div>

      <div key={"content-"+(period||"all")} style={{padding:"14px 20px 80px"}}>

        {/* Period tabs — scrollable, no overflow */}
        <div style={{position:"relative",display:"flex",gap:3,marginBottom:period?16:28,background:DB.paper,
          padding:3,borderRadius:12,border:"1px solid "+DB.hairline,overflow:"hidden"}}>
          {presets.map(function(pair){
            var v=pair[0],l=pair[1],sel=period===v;
            return(
              <button key={v} onClick={function(){setPeriod(sel?null:v);}}
                style={{flex:1,padding:"9px 2px",borderRadius:9,border:"none",
                  background:sel?DB.ink:"transparent",color:sel?"#fff":DB.muted,
                  fontSize:13,fontWeight:600,fontFamily:DB.sans,cursor:"pointer",
                  whiteSpace:"nowrap",minWidth:0}}>
                {l}
              </button>
            );
          })}
          {/* "All" pill shown when nothing selected */}
          {!period&&(
            <div style={{position:"absolute",left:"50%",transform:"translateX(-50%)",
              bottom:-20,fontSize:10,color:DB.muted,whiteSpace:"nowrap"}}>
              tap a tab to filter
            </div>
          )}
        </div>

        {/* Period summary card */}
        {dataRows.length>0&&(
          <div key={"summary-"+(period||"all")} style={{marginBottom:16}}>
            <div style={{fontSize:10,letterSpacing:1.2,textTransform:"uppercase",
              fontWeight:700,color:DB.muted,marginBottom:10,paddingLeft:2}}>
              {period?"Last "+period+" days":"All time"} · {dataRows.length} days with data
            </div>

            {/* 4 stat cards in 2x2 grid */}
            {(function(){
              // avg nap count = avg number of naps per day
              var napCounts=dataRows.map(function(r){return r.napCount||0;});
              var avgNapCount=napCounts.length?Math.round(napCounts.reduce(function(a,b){return a+b;},0)/napCounts.length):null;

              // avg single nap duration = total nap time / total naps
              var totalNapMins=dataRows.reduce(function(s,r){return s+(r.sleepDay||0);},0);
              var totalNaps=dataRows.reduce(function(s,r){return s+(r.napCount||0);},0);
              var avgSingleNap=totalNaps>0?Math.round(totalNapMins/totalNaps):null;

              // avg night sleep
              var nightVals=dataRows.map(function(r){return r.sleepNight;}).filter(function(v){return v!=null;});
              var avgNightSleep=nightVals.length?Math.round(nightVals.reduce(function(a,b){return a+b;},0)/nightVals.length):null;

              // avg total nap time per day
              var napVals=dataRows.map(function(r){return r.sleepDay;}).filter(function(v){return v!=null;});
              var avgTotalNaps=napVals.length?Math.round(napVals.reduce(function(a,b){return a+b;},0)/napVals.length):null;

              var cards=[
                {
                  icon:"moon", iconColor:nightColor, bg:nightSoftColor,
                  label:"Night sleep",
                  value:avgNightSleep!=null?(Math.floor(avgNightSleep/60)+"h "+(avgNightSleep%60)+"m"):null,
                  sub:"average per night",
                },
                {
                  icon:"nap", iconColor:color.accent, bg:accentSoft,
                  label:"Naps per day",
                  value:avgNapCount!=null?avgNapCount+"":null,
                  sub:"average number",
                },
                {
                  icon:"nap", iconColor:color.accent, bg:accentSoft,
                  label:"Each nap",
                  value:avgSingleNap!=null?(avgSingleNap>=60?Math.floor(avgSingleNap/60)+"h "+(avgSingleNap%60)+"m":avgSingleNap+"m"):null,
                  sub:"average duration",
                },
                {
                  icon:"sun", iconColor:DB.muted, bg:DB.hairlineSoft||"#F4ECE0",
                  label:"Naps total",
                  value:avgTotalNaps!=null?(Math.floor(avgTotalNaps/60)+"h "+(avgTotalNaps%60)+"m"):null,
                  sub:"per day",
                },
              ];

              return(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {cards.map(function(card){
                    if(!card.value)return null;
                    return(
                      <div key={card.label} style={{background:DB.paper,borderRadius:16,
                        border:"1px solid "+DB.hairline,padding:"14px 16px",
                        borderTop:"3px solid "+card.iconColor}}>
                        <div style={{fontSize:11,color:DB.muted,fontWeight:600,marginBottom:6,lineHeight:1.3}}>
                          {card.label}
                        </div>
                        <div style={{fontFamily:DB.serif,fontSize:30,fontWeight:400,
                          color:DB.ink,letterSpacing:-0.8,lineHeight:1,marginBottom:4}}>
                          {card.value}
                        </div>
                        <div style={{fontSize:11,color:DB.muted}}>{card.sub}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}

        {/* By day timeline */}
        {rows.length>0&&(
          <DayTimelines rows={rows} color={color} nightColor={nightColor} accentDeep={accentDeep} accentSoft={accentSoft} period={period}/>
        )}

        {dataRows.length===0&&(
          <div style={{textAlign:"center",color:DB.muted,padding:"48px 0",fontSize:15}}>No data for this period yet.</div>
        )}
      </div>
    </div>
  );
}

function DayTimelines(props) {
  var rows=props.rows, color=props.color, nightColor=props.nightColor;
  var accentDeep=props.accentDeep, accentSoft=props.accentSoft;
  var period=props.period;
  const [activeDate, setActiveDate] = useState(null);
  useEffect(function(){ setActiveDate(null); }, [period]);

  function minToHHMM(m){
    if(m===null||m===undefined)return"—";
    var h=Math.floor(m/60),mn=m%60;
    return String(h).padStart(2,"0")+":"+String(mn).padStart(2,"0");
  }
  function buildTooltip(r){
    var lines=[];
    var day=r.day||{};
    var wn=timeToMin(day.wakeNight||""), s1=timeToMin(day.sleep1||""), a2=timeToMin(day.awake2||""),
        s2=timeToMin(day.sleep2||""), a3=timeToMin(day.awake3||""), s3=timeToMin(day.sleep3||""),
        a4=timeToMin(day.awake4||""), s4=timeToMin(day.sleep4||""), a5=timeToMin(day.awake5||""),
        s5=timeToMin(day.sleep5||""), a6=timeToMin(day.awake6||""), ns=timeToMin(day.nightSleep||"");
    if(wn!==null) lines.push({label:"Woke up",val:minToHHMM(wn),type:"wake"});
    if(s1!==null&&a2!==null) lines.push({label:"Nap 1",val:minToHHMM(s1)+" – "+minToHHMM(a2)+" · "+fmtDur(a2-s1),type:"nap"});
    if(s2!==null&&a3!==null) lines.push({label:"Nap 2",val:minToHHMM(s2)+" – "+minToHHMM(a3)+" · "+fmtDur(a3-s2),type:"nap"});
    if(s3!==null&&a4!==null) lines.push({label:"Nap 3",val:minToHHMM(s3)+" – "+minToHHMM(a4)+" · "+fmtDur(a4-s3),type:"nap"});
    if(s4!==null&&a5!==null) lines.push({label:"Nap 4",val:minToHHMM(s4)+" – "+minToHHMM(a5)+" · "+fmtDur(a5-s4),type:"nap"});
    if(s5!==null&&a6!==null) lines.push({label:"Nap 5",val:minToHHMM(s5)+" – "+minToHHMM(a6)+" · "+fmtDur(a6-s5),type:"nap"});
    if(ns!==null) lines.push({label:"Night sleep",val:minToHHMM(ns)+" → 00:00",type:"night"});
    if(r.sleepNight!=null) lines.push({label:"Night total",val:fmtDur(r.sleepNight),type:"total"});
    if(r.sleepDay!=null) lines.push({label:"Naps total",val:fmtDur(r.sleepDay),type:"total"});
    if(r.sleepTotal!=null) lines.push({label:"Total sleep",val:fmtDur(r.sleepTotal),type:"grand"});
    return lines;
  }

  return(
    <div>
      <div style={{fontSize:10,letterSpacing:1.3,textTransform:"uppercase",fontWeight:700,color:DB.muted,marginBottom:10}}>By day</div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {rows.map(function(r){
          var d=new Date(r.date+"T12:00:00");
          var isToday=r.date===todayStr();
          var isActive=activeDate===r.date;
          var dow=d.toLocaleDateString("en-GB",{weekday:"short"});
          var dayNum=d.getDate();
          var tooltip=isActive?buildTooltip(r):null;

          return(
            <div key={r.date}>
              <div onClick={function(){if(r.hasData)setActiveDate(isActive?null:r.date);}}
                style={{display:"flex",alignItems:"center",gap:10,
                  padding:"8px 10px",borderRadius:12,
                  background:isActive?DB.paper:isToday?DB.paper:"transparent",
                  border:isActive?"1px solid "+accentDeep:(isToday?"1px solid "+DB.hairline:"1px solid transparent"),
                  opacity:r.hasData?1:0.3,cursor:r.hasData?"pointer":"default",
                  transition:"all 0.15s"}}>
                {/* Date */}
                <div style={{width:40,flexShrink:0}}>
                  <div style={{fontSize:10,color:isToday?accentDeep:DB.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.3}}>{dow}</div>
                  <div style={{fontFamily:DB.serif,fontSize:22,color:isActive?accentDeep:DB.ink,lineHeight:1,letterSpacing:-0.5}}>{dayNum}</div>
                </div>
                {/* Bar + scale */}
                <div style={{flex:1,minWidth:0}}>
                  {/* Hour scale */}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:8,
                    color:DB.muted,marginBottom:3,letterSpacing:0.2,paddingRight:1}}>
                    {["00","06","12","18","24"].map(function(h){return <span key={h}>{h}</span>;})}
                  </div>
                  {/* Timeline */}
                  <div style={{position:"relative",height:14,borderRadius:5,background:DB.hairline,overflow:"hidden"}}>
                    {r.segs.map(function(seg,si){
                      var lp=(seg.start/1440)*100;
                      var wp=((seg.end-seg.start)/1440)*100;
                      var bg=seg.type==="night"?nightColor:color.accent;
                      return <div key={si} style={{position:"absolute",left:lp+"%",width:wp+"%",height:"100%",background:bg,borderRadius:3}}/>;
                    })}
                  </div>
                </div>
                {/* Total */}
                <div style={{width:52,textAlign:"right",flexShrink:0}}>
                  {r.hasData&&r.sleepTotal!=null
                    ?<span style={{fontSize:11,fontWeight:700,color:isActive?accentDeep:DB.ink}}>{fmtDur(r.sleepTotal)}</span>
                    :<span style={{fontSize:11,color:DB.muted}}>—</span>}
                </div>
              </div>

              {/* Tooltip panel */}
              {isActive&&tooltip&&tooltip.length>0&&(
                <div style={{margin:"2px 0 6px 50px",padding:"10px 14px",borderRadius:12,
                  background:DB.paper,border:"1px solid "+DB.hairline,
                  boxShadow:"0 4px 16px rgba(0,0,0,0.08)"}}>
                  {tooltip.map(function(line,li){
                    var isGrand=line.type==="grand";
                    var isTotal=line.type==="total";
                    var isNight=line.type==="night";
                    var isNap=line.type==="nap";
                    return(
                      <div key={li} style={{display:"flex",justifyContent:"space-between",
                        alignItems:"baseline",padding:"4px 0",
                        borderBottom:li<tooltip.length-1?"1px solid "+DB.hairlineSoft:"none",
                        borderTop:isGrand?"1px solid "+DB.hairline:"none",
                        marginTop:isGrand?4:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          {isNight&&<div style={{width:8,height:8,borderRadius:2,background:nightColor,flexShrink:0}}/>}
                          {isNap&&<div style={{width:8,height:8,borderRadius:2,background:color.accent,flexShrink:0}}/>}
                          <span style={{fontSize:11,color:isGrand?DB.ink:DB.muted,fontWeight:isGrand?700:400}}>{line.label}</span>
                        </div>
                        <span style={{fontSize:11,fontWeight:isGrand?700:600,
                          color:isGrand?accentDeep:isTotal?DB.ink:DB.ink2,
                          fontFamily:isGrand?DB.serif:DB.sans,letterSpacing:isGrand?-0.3:0}}>
                          {line.val}
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* Legend */}
      <div style={{display:"flex",gap:16,marginTop:12,padding:"0 4px"}}>
        <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:DB.muted}}>
          <div style={{width:10,height:10,borderRadius:2,background:nightColor}}/>Night
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:DB.muted}}>
          <div style={{width:10,height:10,borderRadius:2,background:color.accent}}/>Nap
        </div>
      </div>
    </div>
  );
}

function buildTimelineSegs(day){
  var segs=[];
  var g=function(k){return timeToMin(day[k]||"");};
  var wn=g("wakeNight"),s1=g("sleep1"),a2=g("awake2"),s2=g("sleep2"),a3=g("awake3"),
      s3=g("sleep3"),a4=g("awake4"),s4=g("sleep4"),a5=g("awake5"),s5=g("sleep5"),a6=g("awake6"),ns=g("nightSleep");
  if(wn!==null) segs.push({type:"night",start:0,end:wn});
  var naps=[[s1,a2],[s2,a3],[s3,a4],[s4,a5],[s5,a6]];
  naps.forEach(function(pair){
    if(pair[0]!==null&&pair[1]!==null) segs.push({type:"nap",start:pair[0],end:pair[1]});
  });
  if(ns!==null) segs.push({type:"night",start:ns,end:1440});
  return segs;
}
